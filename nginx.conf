events { 
    worker_connections 1024; 
}

http {
    server {
        listen 80;
        
        # 1. Update to your real domain
        server_name movie-trip.kurangdoa.com localhost;

        # Needed for Certbot to verify your domain
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }

        # 2. Route /api/ to your FastAPI Backend
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route /docs so you can still see your Swagger UI
        location /docs {
            proxy_pass http://backend:8000/docs;
        }
        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
        }

        # 3. Route everything else to the Next.js Frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}