services:

  frontend:
    container_name: frontend
    build: .
    expose:
      - "3000"
    ports:
      - "3000:3000" # Open port 3000 directly to your browser
    environment:
      # Talk directly to the local backend, completely bypassing Nginx
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - movie-network
networks:
  movie-network:
    external: true