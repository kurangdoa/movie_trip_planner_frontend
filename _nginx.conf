events { 
    worker_connections 1024; 
}

http {
    # SERVER 1: Catch HTTP (Port 80) and force it to HTTPS
    server {
        listen 80;
        server_name movie-trip.kurangdoa.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # SERVER 2: The Secure App (Port 443)
    server {
        listen 443 ssl;
        server_name movie-trip.kurangdoa.com;

        # SSL Certificates (The files Certbot just created)
        ssl_certificate /etc/letsencrypt/live/movie-trip.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/movie-trip.kurangdoa.com/privkey.pem;

        # Standard SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Route /api/ to FastAPI
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route / to Next.js Frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}